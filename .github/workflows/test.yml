name: Test

on:
  pull_request:
  workflow_dispatch:
    inputs:
      libnode_url:
        description: Download URL for libnode.zip
        required: false
        type: string
      plugin_artifact_name:
        description: Packaged plugin artifact to smoke test instead of building Linux locally
        required: false
        type: string
  workflow_call:
    inputs:
      libnode_url:
        description: Download URL for libnode.zip
        required: false
        type: string
      plugin_artifact_name:
        description: Packaged plugin artifact to smoke test instead of building Linux locally
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: "3.14"
  GODOT_VERSION: "4.7-stable"

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install -r generator/requirements.txt

      - name: Run generator
        run: python generator/generator.py

      - name: Verify generator idempotency
        shell: bash
        run: |
          set -euo pipefail
          python generator/generator.py > "$RUNNER_TEMP/generator-second-run.log"
          if grep -q "^Generated:" "$RUNNER_TEMP/generator-second-run.log"; then
            cat "$RUNNER_TEMP/generator-second-run.log"
            echo "Generator produced changes on a second run." >&2
            exit 1
          fi

      - name: Run repository integrity tests
        run: python -m unittest discover -s test

  smoke:
    name: Linux Godot smoke
    runs-on: ubuntu-22.04
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install -r generator/requirements.txt

      - name: Download packaged plugin
        if: ${{ inputs.plugin_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plugin_artifact_name }}
          path: ${{ runner.temp }}/gode-plugin

      - name: Install packaged plugin
        if: ${{ inputs.plugin_artifact_name != '' }}
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gode-plugin/gode.zip"
          package_root="$RUNNER_TEMP/gode-package"

          if [ ! -f "$archive" ]; then
            echo "Packaged plugin archive was not found: $archive" >&2
            exit 1
          fi

          rm -rf "$package_root" example/addons/gode
          mkdir -p "$package_root" example/addons
          unzip -q "$archive" -d "$package_root"

          if [ ! -f "$package_root/gode/plugin.cfg" ]; then
            echo "Packaged plugin is missing plugin.cfg" >&2
            exit 1
          fi
          if [ ! -f "$package_root/gode/binary/linux/x64/libgode.so" ]; then
            echo "Packaged plugin is missing the Linux x64 binary" >&2
            exit 1
          fi
          if [ ! -f "$package_root/gode/tsc/lib/typescript.js" ]; then
            echo "Packaged plugin is missing the TypeScript compiler" >&2
            exit 1
          fi

          mv "$package_root/gode" example/addons/gode

      - name: Mask libnode URL
        if: ${{ inputs.plugin_artifact_name == '' }}
        shell: bash
        env:
          LIBNODE_URL: ${{ inputs.libnode_url || secrets.LIBNODE_URL }}
        run: |
          if [ -n "$LIBNODE_URL" ]; then
            echo "::add-mask::$LIBNODE_URL"
          fi

      - name: Prepare libnode
        if: ${{ inputs.plugin_artifact_name == '' }}
        shell: bash
        env:
          LIBNODE_URL: ${{ inputs.libnode_url || secrets.LIBNODE_URL }}
        run: >
          ./.github/shell/prepare-libnode.sh
          --url "$LIBNODE_URL"

      - name: Build Linux
        if: ${{ inputs.plugin_artifact_name == '' }}
        shell: bash
        run: ./shell/build-linux.sh --arch x64 --config Release --fresh

      - name: Prepare TypeScript compiler
        if: ${{ inputs.plugin_artifact_name == '' }}
        shell: bash
        run: ./.github/shell/prepare-typescript.sh

      - name: Download Godot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/godot"
          curl -fsSL \
            -o "$RUNNER_TEMP/godot.zip" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          GODOT_BIN="$(find "$RUNNER_TEMP/godot" -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          if [ -z "$GODOT_BIN" ]; then
            echo "Godot executable was not found in downloaded archive" >&2
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

      - name: Run Godot smoke tests
        run: python test/run_godot_smoke.py --godot "$GODOT_BIN" --strict-exit-leaks
